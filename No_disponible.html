<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>No Disponible</title>
  <style>
    /* Fuente moderna y reset básico */
    body {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: #181818;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #333;
      zoom:75%;
    }

    .card {
      background: #fff;
      padding: 50px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #e63946;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      color: #555;
    }

    a.button {
      display: inline-block;
      padding: 14px 28px;
      background: #06d6a0;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      transition: transform 0.2s ease, background 0.3s ease;
    }

    a.button:hover {
      background: #04b383;
      transform: scale(1.05);
    }

    /* Animación de entrada */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Página No Disponible</h1>
    <p>Lo sentimos, este contenido no está accesible en este momento.</p>
    <a href="index.html" class="button">Volver al Inicio</a>
  </div>
</body>
</html>
