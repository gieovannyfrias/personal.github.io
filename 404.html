<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=3.0, minimum-scale=1.0">
   <link rel="icon" href="https://personal.gieovannyfrias.com/Imagenes/Logo.webp" type="image/x-icon">
  <title>Error 404 - Personal</title>
  
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <h2>Gieovanny Frías | Personal</h2>
    <p>La página que buscas no existe. Tal vez fue eliminada o nunca se publicó.</p>
    <a href="/">Volver al inicio</a>
  </div>
  
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #e0e0e0;
      zoom:75%;
    }
    .card {
      background: #1e1e1e;
      padding: 60px;
      border-radius: 20px;
      box-shadow: 
        10px 10px 20px #0a0a0a,
        -10px -10px 20px #2a2a2a;
      text-align: center;
      max-width: 600px;
      animation: zoomIn 0.9s ease;
    }
    h1 {
      font-size: 6em;
      margin: 0;
      font-weight: 900;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 {
      font-size: 2em;
      margin: 20px 0;
      color: #f5f5f5;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    p {
      font-size: 1.2em;
      color: #b0b0b0;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }
    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</body>
</html>
