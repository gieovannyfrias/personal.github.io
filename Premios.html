  0% {
    box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
    border-color: #ff0000;
  }
  25% {

  }
  50% {

  }

    border-color: #ffff00;
  }
  100% {

}
.ruleta canvas {

  <script>
  
const premios = [
  { nombre: 'Taza', img: 'https://lh3.googleusercontent.com/d/1RrBr3DhCq8vmXv2Pn88CFrMNLI1LlCP6=w1000' },
  { nombre: 'Gorra', img: 'https://lh3.googleusercontent.com/d/1YjSHibt9VN7ADdEyfWZRJczwskjGn5Qr=w1000' },
  { nombre: 'Mouse', img: 'https://lh3.googleusercontent.com/d/1VTOgNQUhFeNAsZ6oU2TMxYn5522rROcn=w1000' },
  { nombre: 'Café', img: 'https://lh3.googleusercontent.com/d/1QyhbJQpJX2KUINhXS4vtSS0JY3LszANV=w1000' },
  { nombre: 'Dulces', img: 'https://lh3.googleusercontent.com/d/10jqJ1iLr_vRtvftVzk2Eb_dxxVjMlogs=w1000' },
  { nombre: 'Llavero', img: 'https://lh3.googleusercontent.com/d/19o0936G634Pr1UT5vihZDg-jyQY7Bbrk=w1000' },
  { nombre: 'Camiseta', img: 'https://lh3.googleusercontent.com/d/12xJi8Sdb_LTbWM7BsywLmFafj-QWHOgN=w1000' },
  { nombre: 'Audífonos', img: 'https://lh3.googleusercontent.com/d/1C68u--cyHVXpyFiCQZ0affp7GpF7px30=w1000' },
  { nombre: 'Botella', img: 'https://lh3.googleusercontent.com/d/1l8VOCFer2T1BghVITTQ5WdQ8oavlug44=w1000' },
  { nombre: 'Cuaderno', img: 'https://lh3.googleusercontent.com/d/1WjnVU2zBCGmcX3tzxuLTLuOSl8Pl133A=w1000' },
  { nombre: 'Powerbank', img: 'https://lh3.googleusercontent.com/d/1tspt8zu06J4y6OpTK120xn8CEE3VTcle=w1000' },
  { nombre: 'Agenda', img: 'https://lh3.googleusercontent.com/d/1JMFZgjwTWcnEHdy-JL9IU-WoxY5QrQ9L=w1000' },
  { nombre: 'Bolígrafo', img: 'https://lh3.googleusercontent.com/d/1T-JJzS6T7_388YL1ZZCAXYgRb7oMjSD1=w1000' },
  { nombre: 'Sticker', img: 'https://lh3.googleusercontent.com/d/1LDnUZDZP9jgjg3eLlhVpOwe6Kq7zWuFn=w1000' }
];

const colores = [
  '#b3c6ff', '#5cacee', '#1976d2', '#64b5f6', '#2196f3', '#1565c0', '#90caf9', '#42a5f5', '#82b1ff', '#0d47a1', '#4fc3f7', '#1e88e5', '#80d8ff', '#2962ff'
];
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const premioDiv = document.getElementById('premio');
const girarBtn = document.getElementById('girarBtn');
let anguloActual = 0;
let girando = false;
const audio = new Audio('sonido.mp3');
audio.preload = 'auto';
let audioPlaying = false;

function dibujarRuleta() {
  const radio = canvas.width / 2;
  const botonRadio = Math.min(canvas.width, canvas.height) * 0.11;
  for (let i = 0; i < premios.length; i++) {
    const angInicio = (2 * Math.PI / premios.length) * i;
    const angFin = angInicio + 2 * Math.PI / premios.length;
    ctx.beginPath();
    ctx.moveTo(radio, radio);
    ctx.arc(radio, radio, radio, angInicio, angFin);
    ctx.closePath();
    ctx.fillStyle = colores[i % colores.length];
    ctx.fill();

    ctx.save();
    ctx.translate(radio, radio);
    ctx.rotate(angInicio + Math.PI / premios.length);
    ctx.rotate(Math.PI);
    ctx.textAlign = 'left';

    let fontSize = 22;
    ctx.font = `bold ${fontSize}px Segoe UI, Arial`;
    let maxWidth = radio - 48;
    while (ctx.measureText(premios[i].nombre).width > maxWidth && fontSize > 10) {
      fontSize -= 1;
      ctx.font = `bold ${fontSize}px Segoe UI, Arial`;
    }

    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#1a237e';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#0008';
    ctx.shadowBlur = 8;
    ctx.strokeText(premios[i].nombre, 24 - radio, 12);
    ctx.fillText(premios[i].nombre, 24 - radio, 12);
    ctx.restore();
  }
}


dibujarRuleta();

function girarRuleta() {
  if (girando) return;
  girando = true;
  premioDiv.textContent = '';
  audio.pause();
  audio.currentTime = 0;
  audio.play().catch(() => {});
  
  const vueltas = Math.floor(Math.random() * 3) + 5;
  const anguloPorPremio = 2 * Math.PI / premios.length;
  const anguloOffsetFlecha = Math.PI;
  const anguloRandom = Math.random() * 2 * Math.PI;
  const anguloFinal = (2 * Math.PI * vueltas) + anguloRandom;
  const duracion = 10500;
  const inicio = performance.now();

  function animar(now) {
    const t = Math.min((now - inicio) / duracion, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    anguloActual = ease * anguloFinal;

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(anguloActual);
    ctx.translate(-canvas.width / 2, -canvas.height / 2);
    dibujarRuleta();
    ctx.restore();

    // Sonido de clic cada cierto ángulo
    if (Math.floor(anguloActual / (Math.PI / 12)) !== Math.floor((anguloActual - 0.05) / (Math.PI / 12))) {
      new Audio('https://personal.gieovannyfrias.com/Musica/sonido_click.mp3').play().catch(() => {});
    }

    if (t < 1) {
      requestAnimationFrame(animar);
    } else {
      girando = false;
      let anguloTotal = anguloFinal % (2 * Math.PI);
      let anguloFlecha = (anguloOffsetFlecha - anguloTotal + 2 * Math.PI) % (2 * Math.PI);
      let premioIndex = Math.floor(anguloFlecha / anguloPorPremio) % premios.length;
      mostrarPremio(premioIndex);
    }
  }
  requestAnimationFrame(animar);
}


girarBtn.addEventListener('click', girarRuleta);
function lanzarConfeti() {
  const duration = 2 * 1000; // 2 segundos
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 55,
      origin: { x: 0 }
    });
    confetti({
      particleCount: 5,
      angle: 120,
      spread: 55,
      origin: { x: 1 }
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  }());
}

function mostrarPremio(idx) {
  const premio = premios[idx];
  premioDiv.innerHTML = `
    <div class="premio-contenedor">
      <img src="${premio.img}" alt="${premio.nombre}" class="premio-img">
      <span>¡Ganaste: ${premio.nombre}! 🎉</span>
    </div>
  `;
  lanzarConfeti(); // dispara el confeti
}


// Redibuja la ruleta si cambia el tamaño (responsive)
window.addEventListener('resize', () => {
  // Ajusta el tamaño del canvas según el tamaño del contenedor
  const ruleta = document.getElementById('ruleta');
  let size = ruleta.offsetWidth;
  canvas.width = size;
  canvas.height = size;
  dibujarRuleta();
});
    //audio de fondo mp3
    document.addEventListener('click', function playSound() {
    const audio = document.getElementById('audioelement');
    audio.play().catch(error => {
        console.error("Error al reproducir el audio:", error);
    });
    document.removeEventListener('click', playSound);
});
  </script>
